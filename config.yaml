# job_auto configuration — centralized job-search centre.
# This project only discovers and filters jobs; it never submits.
# Applying is done by you in the browser (e.g. via the Chrome extension).

data:
  companies_file: data/companies.json
  ledger_db: data/applied.sqlite

# Candidate profile: ~6 years total experience (mid-senior IC). Seniority is
# controlled by title excludes below + engine/match.py SENIORITY_PREFIXES:
#   - Senior / Sr titles are KEPT (allowed)
#   - Lead / Staff / Principal / Manager / Director / Head / Architect are BLOCKED
# The matcher cannot parse years-of-experience from JDs, so seniority is
# enforced via title keywords, not a numeric filter.
target:
  role_keywords:
    # --- offensive security / application security ---
    - penetration tester
    - pentester
    - penetration testing
    - pentest
    - offensive security
    - red team
    - red teaming
    - vulnerability researcher
    - vulnerability research
    - exploit developer
    - exploit development
    - security researcher
    - security research
    - ethical hacker
    - ethical hacking
    - application security engineer
    - application security
    - appsec
    - product security engineer
    - product security
    - prodsec
    - software security engineer
    - software security
    # --- detection / SOC / IR / DFIR ---
    - soc analyst
    - security operations
    - security operations center
    - threat intelligence
    - threat analyst
    - threat hunter
    - threat hunting
    - detection engineer
    - detection engineering
    - incident response
    - incident responder
    - digital forensics
    - forensic analyst
    - dfir
    - malware analyst
    - malware analysis
    - reverse engineer
    - reverse engineering
    # --- cloud / platform / infrastructure security ---
    - cloud security engineer
    - cloud security
    - infrastructure security
    - platform security engineer
    - platform security
    - security platform engineer
    # --- GRC / compliance / risk / IAM ---
    - grc
    - governance risk compliance
    - governance risk and compliance
    - risk analyst
    - security risk
    - compliance analyst
    - compliance engineer
    - security compliance
    - identity and access management
    - iam engineer
    - zero trust engineer
    - access management
    # --- security automation ---
    - security automation
    - security automation engineer
    # --- general security ---
    - security engineer
    - security analyst
    - security consultant
    - information security
    - infosec
    - cybersecurity
    - cyber security
    # --- QA / SDET (kept: candidate is also open to these) ---
    - qa engineer
    - qa automation
    - quality assurance
    - quality engineer
    - test automation
    - automation engineer
    - software qa
    - sdet
    - software development engineer in test
    - software engineer in test
    - engineer in test
    - test engineer
    - automation test engineer
  exclude_keywords:
    # management / too-senior for a 6-year IC
    - manager
    - director
    - head of
    - lead
    - principal
    - staff
    - intern
    - architect
    # pure infra roles (NOT security) — devsecops kept excluded by choice
    - devops
    - devsecops
    - sre
    - site reliability
    # hardware / physical / material test roles — NOT software-stack test/automation.
    # A test/QA/automation title that names a hardware/robotics/physical/material
    # domain is non-software testing and is rejected. Substrings chosen to avoid
    # false positives on real software titles (e.g. "electronics" plural, not
    # "electronic" which appears in "electronic trading"; "physical test", not
    # "physical" which appears in "physical security").
    - hardware
    - robotics
    - robot
    - mechanical
    - electrical
    - electronics
    - semiconductor
    - materials
    - material test
    - material testing
    - physical test
    - physical testing
    - embedded test
    - hardware-in-the-loop
    - hardware in the loop
    - destructive test
    - tensile
    - fatigue test
    - vibration test
    - environmental test
    # NOTE: "infrastructure" and "platform engineer" were removed from this
    # list because they are substrings of valid security titles
    # ("infrastructure security engineer", "security platform engineer").
    # Pure-infra roles carry no security role keyword, so role_keywords alone
    # rejects them — the excludes are no longer needed and were over-matching.
  location_pref: ["remote", "worldwide", "global", "india", "bengaluru", "bangalore",
                 "pune", "hyderabad", "mumbai", "chennai", "kerala", "delhi",
                 "europe", "emea", "eu", "apac", "latam",
                 # Singapore + SE Asia (was missing — onsite SG jobs were rejected by match.py)
                 "singapore", "sg", "asia", "southeast asia", "sea",
                 "malaysia", "kuala lumpur", "indonesia", "jakarta",
                 "vietnam", "hanoi", "philippines", "manila",
                 "thailand", "bangkok", "hong kong", "taiwan",
                 # Australia + New Zealand
                 "australia", "sydney", "melbourne", "brisbane",
                 "new zealand", "auckland",
                 # Japan + Korea
                 "japan", "tokyo", "south korea", "korea", "seoul",
                 # EU/Germany + other underrepresented hubs
                 "germany", "berlin", "munich", "frankfurt",
                 "netherlands", "amsterdam", "ireland", "dublin",
                 "spain", "barcelona", "madrid", "poland", "warsaw", "krakow",
                 "czech", "prague", "tel aviv",
                 # --- UK + Ireland (was missing — London cyber roles rejected) ---
                 "london", "uk", "united kingdom", "england", "britain",
                 "belfast", "manchester", "edinburgh", "dublin",
                 # --- Latin America (LATAM token didn't match country/city names) ---
                 "brazil", "sao paulo", "são paulo", "belo horizonte",
                 "rio de janeiro", "mexico", "mexico city", "cdmx",
                 "argentina", "buenos aires",
                 # --- rest of Western Europe ---
                 "france", "paris", "portugal", "lisbon",
                 "switzerland", "zurich", "geneva", "austria", "vienna",
                 "italy", "milan", "rome", "greece", "athens",
                 # --- Nordics + Eastern Europe ---
                 "sweden", "stockholm", "norway", "oslo", "finland", "helsinki",
                 "denmark", "copenhagen", "romania", "bucharest", "hungary",
                 "budapest", "bulgaria", "sofia", "ukraine", "kyiv",
                 # --- Asia hubs not already covered ---
                 "taipei", "china", "shanghai", "beijing", "shenzhen",
                 # --- India cities/states that list city+state instead of "India" ---
                 "noida", "uttar pradesh", "gurgaon", "gurugram", "karnataka",
                 "telangana", "maharashtra",
                 # --- Africa ---
                 "south africa", "cape town", "johannesburg",
                 # --- small island hubs ---
                 "malta"]
  work_types: ["remote", "hybrid"]

allow_companies: null
skip_companies: ["Canonical", "Coinbase", "Jobgether", "PentStark", "ZynoSec"]   # PentStark: discarded at user request (18 jobs, 8 matched). ZynoSec: discarded at user request (15 jobs, 6 matched) — manual-target mailto board, kept re-surfacing after row deletion because it's still in data/raw/target_companies.json → companies.json → scheduler re-enumerates; skip_companies is the durable exclusion. Canonical: strict AI checks; would reject. Coinbase: greenhouse board redirects to a 403-bot-walled SPA — job links don't land on a JD, 0 candidate matches (all US/finance). Surfaced as a single career-page stub instead. Jobgether: a remote-job MATCHING PLATFORM (domain_hint 'remote/jobs platform'), not an employer — its lever board hosts postings from many companies but enumeration loses the real employer (all 4603 rows show company=Jobgether). Apply links go to Jobgether, not the hiring company, so these aren't real employer openings.

safety:
  dry_run: true
  min_delay_seconds: 45
  max_delay_seconds: 180
  max_applications_per_run: 120   # raised from 20 so a manual session can reach 100+ jobs
  skip_if_captcha: true
  skip_if_tos_anti_automation: true
  respect_robots_txt: true

ats_priority:
  - workable
  - greenhouse
  - lever
  - ashby
  - smartrecruiters

http:
  timeout_seconds: 20
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
  retries: 2

# --- dashboard app (app/backend) — optional; env vars (JOBAUTO_*) override ---
app:
  tick_minutes: 5        # how often the discovery task fires
  rotate_size: 200       # companies enumerated per tick (~2700 automatable covered ~1.1h; was 120/~1.8h)
  company_discovery_minutes: 360  # grow the company list every 6h (was 24h) so new
                                  # security-company ATS boards surface faster
  stale_grace_misses: 2  # consecutive absent enumerations before a job is marked closed
  port: 8000
  # jobs_db, engine_config, frontend_dist default sensibly; override via env if needed.