# job_auto — one-command dashboard.
#   docker compose up -d --build   &&   open http://localhost:8000
# The curated company dataset is baked into the image; the live discovery DB
# (data/jobs.db) + caches are persisted in the `jobauto-data` volume so they
# survive container recreations.
services:
  job-auto:
    build: .
    image: job-auto
    container_name: job-auto
    ports:
      - "8000:8000"
    volumes:
      - jobauto-data:/app/data
    restart: unless-stopped

volumes:
  jobauto-data: